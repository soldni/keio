name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  bump-version:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump minor version
        run: |
          CURRENT=$(python -c "exec(open('src/keio/version.py').read()); print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          echo "__version__ = \"$NEW_VERSION\"" > src/keio/version.py
          mkdir -p release-notes
          echo "# Release Notes ($NEW_VERSION)" >> "release-notes/${NEW_VERSION}.md"
          echo ""  >> "release-notes/${NEW_VERSION}.md"
          echo "**Full Changelog**: https://github.com/soldni/keio/compare/v${CURRENT}...v${NEW_VERSION}" >> "release-notes/${NEW_VERSION}.md"
          echo "Bumped version: $CURRENT -> $NEW_VERSION"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(python -c "exec(open('src/keio/version.py').read()); print(__version__)")
          git add .
          git commit -m "Bump version to $NEW_VERSION after release"
          git push
